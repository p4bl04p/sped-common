name: Sincronizacao Automatica do Fork

on:
  schedule:
    - cron: '0 */4 * * *' # Executa automaticamente a cada 4 horas
  workflow_dispatch: # Permite que você force a execução manualmente se quiser

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizando com o Upstream
        uses: tgymnich/fork-sync@v2.0
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          owner: nfephp-org
          base: master
          head: master
